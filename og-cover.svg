<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#112730"/>
      <stop offset="0.65" stop-color="#1B3A43"/>
      <stop offset="1" stop-color="#3D6B74"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#8FBCC2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8FBCC2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- волна снизу -->
  <path d="M0,520 C200,565 200,485 400,520 C600,555 600,485 800,520 C1000,555 1000,485 1200,520 L1200,630 L0,630 Z" fill="#8FBCC2" opacity="0.10"/>
  <path d="M0,560 C200,600 200,525 400,560 C600,595 600,525 800,560 C1000,595 1000,525 1200,560 L1200,630 L0,630 Z" fill="#8FBCC2" opacity="0.16"/>

  <!-- фирменный знак (якорь) -->
  <g transform="translate(120,150)" fill="none" stroke="#8FBCC2" stroke-width="7" stroke-linecap="round">
    <circle cx="60" cy="24" r="16"/>
    <line x1="60" y1="40" x2="60" y2="150"/>
    <line x1="20" y1="66" x2="100" y2="66"/>
    <path d="M14,84 Q14,150 60,164 Q106,150 106,84" stroke-linejoin="round"/>
  </g>

  <!-- текст -->
  <text x="120" y="400" font-family="'Oswald','Arial Narrow',sans-serif" font-weight="700" font-size="76" fill="#F4F6F4" letter-spacing="1">Семейский ССЗ</text>
  <text x="122" y="452" font-family="'PT Sans',Arial,sans-serif" font-size="30" fill="#8FBCC2">Судостроительно-судоремонтный завод</text>

  <!-- значок «с 1908» -->
  <g transform="translate(122,478)">
    <rect x="0" y="0" width="196" height="44" rx="22" fill="none" stroke="#B26A43" stroke-width="2"/>
    <text x="98" y="29" text-anchor="middle" font-family="'Oswald','Arial Narrow',sans-serif" font-weight="600" font-size="22" fill="#B26A43" letter-spacing="1">С 1908 ГОДА</text>
  </g>
  <text x="342" y="507" font-family="'PT Sans',Arial,sans-serif" font-size="24" fill="#DFE6E4">118 лет на Иртыше</text>
</svg>
